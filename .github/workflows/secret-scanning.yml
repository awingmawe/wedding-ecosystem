name: Secret Scanning

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret detection script
        run: |
          # Scan all files in the diff (push or PR)
          set -euo pipefail

          RED='\033[0;31m'
          YELLOW='\033[1;33m'
          NC='\033[0m'

          # Patterns that indicate secrets
          SECRET_PATTERNS=(
            'AKIA[0-9A-Z]{16}'
            '(?i)(api[_-]?key|apikey)\s*[:=]\s*["'"'"'][a-zA-Z0-9_\-]{20,}["'"'"']'
            '(?i)(password|passwd|pwd)\s*[:=]\s*["'"'"'][^\s"'"'"']{8,}["'"'"']'
            '(?i)(secret|token)\s*[:=]\s*["'"'"'][a-zA-Z0-9_\-/.+]{20,}["'"'"']'
            '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
            'gh[pousr]_[A-Za-z0-9_]{36,}'
            '(?i)bearer\s+[a-zA-Z0-9_\-\.]{20,}'
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.[a-zA-Z0-9_\-]+\.[a-zA-Z0-9_\-]+'
            '(?i)(postgres|mysql|mongodb|redis)://[^:]+:[^@]+@'
            'https://hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[a-zA-Z0-9]+'
            '(sk|pk)_(test|live)_[a-zA-Z0-9]{20,}'
            'SG\.[a-zA-Z0-9_\-]{22}\.[a-zA-Z0-9_\-]{43}'
          )

          EXCLUDE_PATTERNS='(\.lock$|node_modules/|\.min\.js$|\.min\.css$|package-lock\.json$|\.turbo/|dist/|\.next/|coverage/|detect-secrets\.sh$|secret-scanning\.yml$|\.example$|\.sample$|\.md$)'

          found_secrets=0

          # Get changed files
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(git diff --name-only --diff-filter=ACMR ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep -vE "$EXCLUDE_PATTERNS" || true)
          else
            files=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD 2>/dev/null | grep -vE "$EXCLUDE_PATTERNS" || git ls-files | grep -vE "$EXCLUDE_PATTERNS")
          fi

          if [ -z "$files" ]; then
            echo "No files to scan"
            exit 0
          fi

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue

            for pattern in "${SECRET_PATTERNS[@]}"; do
              matches=$(grep -nP -- "$pattern" "$file" 2>/dev/null || true)
              if [ -n "$matches" ]; then
                found_secrets=1
                echo "::error file=$file::Potential secret detected in $file"
                echo "$matches" | head -5
              fi
            done
          done <<< "$files"

          if [ $found_secrets -eq 1 ]; then
            echo ""
            echo "::error::đźš¨ Secrets detected in pushed code. Please remove secrets and use environment variables or a secret manager."
            exit 1
          fi

          echo "âś… No secrets detected"

      - name: Check for .env files committed
        run: |
          # Ensure no .env files are committed (except .env.example)
          env_files=$(git ls-files | grep -E '\.env($|\.)' | grep -v '\.example$' | grep -v '\.sample$' || true)
          if [ -n "$env_files" ]; then
            echo "::error::Found .env files committed to repository:"
            echo "$env_files"
            exit 1
          fi
          echo "âś… No .env files committed"
